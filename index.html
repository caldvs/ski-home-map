<!DOCTYPE html>
<html>
<head>
<title>Ski Home — Route Map</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<style>
  body { margin: 0; font-family: -apple-system, sans-serif; }
  #map { position: absolute; top: 0; left: 0; right: 0; bottom: 0; }
  .controls {
    position: absolute; top: 10px; right: 10px; z-index: 1000;
    background: white; padding: 12px; border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3); max-width: 300px;
  }
  .controls select, .controls button {
    width: 100%; margin: 4px 0; padding: 6px; font-size: 14px;
  }
  .controls label { font-size: 13px; font-weight: 600; display: block; margin-top: 8px; }
  .controls .checkboxes label { font-weight: 400; margin-top: 2px; }
  #route-info {
    position: absolute; bottom: 10px; left: 10px; z-index: 1000;
    background: white; padding: 12px; border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3); max-width: 400px;
    max-height: 40vh; overflow-y: auto; display: none; font-size: 13px;
  }
  .leg { padding: 3px 4px; cursor: pointer; border-radius: 3px; }
  .leg-run { color: #333; }
  .leg-lift { color: #0066cc; }
  .leg-skate { color: #999; font-style: italic; }
  #loading { display: none; position: absolute; top: 50%; left: 50%; z-index: 2000;
    transform: translate(-50%,-50%); background: white; padding: 16px 24px;
    border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.3); font-size: 14px; }
</style>
</head>
<body>
<div id="map"></div>
<div id="loading">Loading graph data...<br><span style="font-size:12px;color:#666">First load may take up to 60s while the API wakes up</span></div>
<div class="controls">
  <h3 style="margin:0 0 8px 0">Ski Home</h3>
  <label>Click map to set start, then:</label>
  <label>Home village</label>
  <select id="village"></select>
  <label>Difficulty</label>
  <select id="difficulty">
    <option value="any-piste">Any piste</option>
    <option value="reds-if-needed">Reds if needed</option>
    <option value="prefer-easy">Prefer greens & blues</option>
  </select>
  <label>Mode</label>
  <select id="mode">
    <option value="direct">Direct (fastest)</option>
    <option value="most-skiing">Most skiing</option>
  </select>
  <button id="route-btn" onclick="computeRoute()">Route Home</button>
  <div class="checkboxes" style="margin-top:8px;font-size:12px;color:#666">
    <label><input type="checkbox" id="show-runs" checked onchange="toggleLayer('runs')"> Runs</label>
    <label><input type="checkbox" id="show-lifts" checked onchange="toggleLayer('lifts')"> Lifts</label>
    <label><input type="checkbox" id="show-nodes" onchange="toggleLayer('nodes')"> Nodes</label>
  </div>
</div>
<div id="route-info"></div>

<script>
const API_BASE = 'https://ski-home-api.onrender.com';

const diffColours = {
  novice: '#00aa00', easy: '#0066ff', intermediate: '#ff0000',
  advanced: '#333333', expert: '#333333', freeride: '#ff8800'
};

const map = new maplibregl.Map({
  container: 'map',
  style: 'https://tiles.openfreemap.org/styles/liberty',
  center: [6.945, 45.455],
  zoom: 12.5,
  attributionControl: true,
});

map.addControl(new maplibregl.NavigationControl(), 'top-left');

let startMarker = null;
let startCoord = null;
let graphData = null;
let routeActive = false;

map.on('load', () => init());

async function init() {
  document.getElementById('loading').style.display = 'block';

  try {
    const [graphResp, villagesResp] = await Promise.all([
      fetch(`${API_BASE}/graph`),
      fetch(`${API_BASE}/villages`),
    ]);
    graphData = await graphResp.json();
    const villages = await villagesResp.json();

    // Populate village picker
    const sel = document.getElementById('village');
    for (const name of Object.keys(villages)) {
      const opt = document.createElement('option');
      opt.value = name;
      opt.textContent = name;
      sel.appendChild(opt);
    }

    // Build GeoJSON for runs
    const runFeatures = [];
    const liftFeatures = [];
    const nodeFeatures = [];

    graphData.edges.forEach(e => {
      if (!e.geometry || e.geometry.length < 2) return;
      const feature = {
        type: 'Feature',
        properties: { name: e.name, type: e.type, difficulty: e.difficulty, lift_type: e.lift_type },
        geometry: { type: 'LineString', coordinates: e.geometry },
      };
      if (e.type === 'run' || e.type === 'connection') runFeatures.push(feature);
      else if (e.type === 'lift' || e.type === 'lift_down') liftFeatures.push(feature);
    });

    graphData.nodes.forEach(n => {
      nodeFeatures.push({
        type: 'Feature',
        properties: { name: n.name, elev: n.elev, isVillage: n.villages.length > 0 },
        geometry: { type: 'Point', coordinates: [n.lon, n.lat] },
      });
    });

    // Add sources
    map.addSource('runs', { type: 'geojson', data: { type: 'FeatureCollection', features: runFeatures } });
    map.addSource('lifts', { type: 'geojson', data: { type: 'FeatureCollection', features: liftFeatures } });
    map.addSource('nodes', { type: 'geojson', data: { type: 'FeatureCollection', features: nodeFeatures } });

    // Run lines
    map.addLayer({
      id: 'runs',
      type: 'line',
      source: 'runs',
      paint: {
        'line-color': ['match', ['get', 'difficulty'],
          'novice', '#00aa00', 'easy', '#0066ff', 'intermediate', '#ff0000',
          'advanced', '#333333', 'expert', '#333333', 'freeride', '#ff8800', '#999999'],
        'line-width': 2.5,
        'line-opacity': 0.7,
      },
    });

    // Lift lines
    map.addLayer({
      id: 'lifts',
      type: 'line',
      source: 'lifts',
      paint: {
        'line-color': '#000000',
        'line-width': 2,
        'line-opacity': 0.9,
        'line-dasharray': [6, 3],
      },
    });

    // Node circles (hidden by default)
    map.addLayer({
      id: 'nodes',
      type: 'circle',
      source: 'nodes',
      layout: { visibility: 'none' },
      paint: {
        'circle-radius': 4,
        'circle-color': ['case', ['get', 'isVillage'], '#ff6600', '#666666'],
        'circle-stroke-color': '#333',
        'circle-stroke-width': 1,
      },
    });

    // Tooltips for runs
    const popup = new maplibregl.Popup({ closeButton: false, closeOnClick: false });

    map.on('mouseenter', 'runs', (e) => {
      map.getCanvas().style.cursor = 'pointer';
      const props = e.features[0].properties;
      popup.setLngLat(e.lngLat).setHTML(`<b>${props.name}</b> (${props.difficulty || 'connection'})`).addTo(map);
    });
    map.on('mouseleave', 'runs', () => { map.getCanvas().style.cursor = ''; popup.remove(); });

    map.on('mouseenter', 'lifts', (e) => {
      map.getCanvas().style.cursor = 'pointer';
      const props = e.features[0].properties;
      popup.setLngLat(e.lngLat).setHTML(`<b>${props.name}</b> (${props.lift_type || 'lift'})`).addTo(map);
    });
    map.on('mouseleave', 'lifts', () => { map.getCanvas().style.cursor = ''; popup.remove(); });

    map.on('mouseenter', 'nodes', (e) => {
      map.getCanvas().style.cursor = 'pointer';
      const props = e.features[0].properties;
      popup.setLngLat(e.lngLat).setHTML(`<b>${props.name}</b> (${Math.round(props.elev)}m)`).addTo(map);
    });
    map.on('mouseleave', 'nodes', () => { map.getCanvas().style.cursor = ''; popup.remove(); });

  } catch (err) {
    alert('Failed to load graph data from API: ' + err.message);
  }

  document.getElementById('loading').style.display = 'none';
}

// Click to set start position
map.on('click', (e) => {
  startCoord = e.lngLat;
  if (startMarker) startMarker.remove();

  const el = document.createElement('div');
  el.style.cssText = 'width:14px;height:14px;background:#ff3300;border-radius:50%;border:2px solid white;box-shadow:0 1px 4px rgba(0,0,0,0.5)';
  startMarker = new maplibregl.Marker({ element: el }).setLngLat(e.lngLat).addTo(map);
});

function toggleLayer(name) {
  const layerId = name;
  const cb = document.getElementById('show-' + name);
  if (map.getLayer(layerId)) {
    map.setLayoutProperty(layerId, 'visibility', cb.checked ? 'visible' : 'none');
  }
}

async function computeRoute() {
  if (!startCoord) { alert('Click on the map to set your position first.'); return; }
  const village = document.getElementById('village').value;
  const difficulty = document.getElementById('difficulty').value;
  const mode = document.getElementById('mode').value;

  const url = `${API_BASE}/route?lon=${startCoord.lng}&lat=${startCoord.lat}&village=${encodeURIComponent(village)}&difficulty=${difficulty}&mode=${mode}&geometry=true`;

  document.getElementById('route-btn').textContent = 'Routing...';
  document.getElementById('route-btn').disabled = true;

  try {
    const resp = await fetch(url);
    const data = await resp.json();
    if (data.error) { alert('Routing error: ' + data.error); return; }
    displayRoute(data);
  } catch (err) {
    alert('API request failed: ' + err.message);
  } finally {
    document.getElementById('route-btn').textContent = 'Route Home';
    document.getElementById('route-btn').disabled = false;
  }
}

function clearRoute() {
  // Remove route layers
  const style = map.getStyle();
  style.layers.forEach(l => {
    if (l.id.startsWith('route-leg-')) map.removeLayer(l.id);
  });
  if (map.getSource('route')) map.removeSource('route');
  // Restore base layer opacity
  if (map.getLayer('runs')) map.setPaintProperty('runs', 'line-opacity', 0.7);
  if (map.getLayer('lifts')) map.setPaintProperty('lifts', 'line-opacity', 0.9);
  document.getElementById('route-info').style.display = 'none';
  routeActive = false;
}

function displayRoute(data) {
  clearRoute();
  routeActive = true;

  // Dim base layers
  if (map.getLayer('runs')) map.setPaintProperty('runs', 'line-opacity', 0.15);
  if (map.getLayer('lifts')) map.setPaintProperty('lifts', 'line-opacity', 0.15);

  // Build GeoJSON with one feature per leg
  const features = data.legs.map((leg, i) => {
    let colour;
    if (leg.type === 'run' || leg.type === 'connection') colour = diffColours[leg.difficulty] || '#999';
    else if (leg.type === 'lift' || leg.type === 'lift_down') colour = '#ff00ff';
    else colour = '#ff9900';

    return {
      type: 'Feature',
      properties: { legIdx: i, colour: colour, type: leg.type },
      geometry: { type: 'LineString', coordinates: leg.geometry || [] },
    };
  }).filter(f => f.geometry.coordinates.length >= 2);

  map.addSource('route', { type: 'geojson', data: { type: 'FeatureCollection', features } });

  // Wider background line for visibility
  map.addLayer({
    id: 'route-leg-bg',
    type: 'line',
    source: 'route',
    paint: { 'line-color': '#ffffff', 'line-width': 7, 'line-opacity': 0.6 },
  });

  // Coloured route line
  map.addLayer({
    id: 'route-leg-line',
    type: 'line',
    source: 'route',
    paint: {
      'line-color': ['get', 'colour'],
      'line-width': 4,
      'line-opacity': 0.9,
    },
  });

  // Build info panel
  const info = document.getElementById('route-info');
  let html = `<div style="display:flex;justify-content:space-between;align-items:center">
    <h3 style="margin:0">Route to ${data.to.village}</h3>
    <button onclick="clearRoute()" style="background:none;border:none;font-size:18px;cursor:pointer;padding:0 4px" title="Dismiss">&times;</button>
  </div>`;

  data.legs.forEach((leg, i) => {
    let cls, desc;
    if (leg.type === 'run' || leg.type === 'connection') {
      cls = 'leg-run';
      desc = leg.type === 'connection'
        ? `↔️ ${leg.name} (connection)`
        : `⛷️ ${leg.name} (${leg.difficulty || ''})`;
    } else if (leg.type === 'lift' || leg.type === 'lift_down') {
      cls = 'leg-lift';
      const dir = leg.direction === 'down' ? '⬇' : '⬆';
      desc = `🚡 ${leg.name} (${leg.lift_type || 'lift'} ${dir})`;
    } else {
      cls = 'leg-skate';
      desc = `🛹 ${leg.name}`;
      if (leg.elev_gain) desc += ` (+${Math.round(leg.elev_gain)}m)`;
    }
    html += `<div class="leg ${cls}" data-leg-idx="${i}">${i+1}. ${desc} — ${Math.round(leg.from.elev)}m→${Math.round(leg.to.elev)}m</div>`;
  });

  html += `<hr><b>${data.summary.runs} runs, ${data.summary.lifts} lifts — ~${data.summary.estimated_minutes} min, ${Math.round(data.summary.vertical_m)}m vertical</b>`;
  info.innerHTML = html;
  info.style.display = 'block';

  // Fit to route bounds
  const allCoords = data.legs.flatMap(l => l.geometry || []);
  if (allCoords.length > 0) {
    const bounds = allCoords.reduce(
      (b, c) => b.extend(c),
      new maplibregl.LngLatBounds(allCoords[0], allCoords[0])
    );
    map.fitBounds(bounds, { padding: 80, maxZoom: 15 });
  }

  // Hover highlighting on legs
  info.querySelectorAll('.leg[data-leg-idx]').forEach(el => {
    const idx = parseInt(el.dataset.legIdx);
    el.addEventListener('mouseenter', () => {
      map.setFilter('route-leg-line', ['==', ['get', 'legIdx'], idx]);
      map.setPaintProperty('route-leg-line', 'line-width', 7);
      map.setPaintProperty('route-leg-bg', 'line-opacity', 0.3);
      el.style.background = '#eef';
    });
    el.addEventListener('mouseleave', () => {
      map.setFilter('route-leg-line', null);
      map.setPaintProperty('route-leg-line', 'line-width', 4);
      map.setPaintProperty('route-leg-bg', 'line-opacity', 0.6);
      el.style.background = '';
    });
    el.addEventListener('click', () => {
      const leg = data.legs[idx];
      if (leg.geometry && leg.geometry.length >= 2) {
        const bounds = leg.geometry.reduce(
          (b, c) => b.extend(c),
          new maplibregl.LngLatBounds(leg.geometry[0], leg.geometry[0])
        );
        map.fitBounds(bounds, { padding: 80, maxZoom: 16 });
      }
    });
  });
}
</script>
</body>
</html>
